<body id="body">
    <div id="mensaje" style="font-size: 1em; display: none; position: fixed; z-index: 999;"></div>
    <a href="index.html"><img src="assets/Volver a DID search.png" width="19%" higth="19%"></a>
    <h1>DIDsync</h1>
    <p>envía texto en tiempo real entre dispositivos, unas sola cuenta</p>
    <form id="registro"><h2>Crear cuenta</h2>
        <input type="text" id="nombre" placeholder="tu nombre">
        <input type="email" id="mail" placeholder="tu email">
        <input type="password" id="contrasena" placeholder="tu contraseña">
        <input type="submit">
    </form>
    <form id="iniciar"><h2>Iniciar sesión</h2>
        <input type="email" placeholder="tu email" id="mailE">
        <input type="password" placeholder="tu contraseña" id="contraE">
        <input type="submit">
    </form>
    <div id="ventana" style="display: none;">
    <textarea id="texto" size="80%" cols="50" rows="5"></textarea>
    <button id="cerrar">Cerrar</button>
    </div>
    <script type="module">
        var data;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-analytics.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
    
    const registro = document.getElementById("registro")
    const iniciars = document.getElementById("iniciar")
    const nombreInput = document.getElementById("nombre");
    const mailInput = document.getElementById("mail");
    const contrasenaInput = document.getElementById("contrasena");
    const mailEInput = document.getElementById("mailE");
    const contraEInput = document.getElementById("contraE");
    const texto = document.getElementById("texto");
    const ventana = document.getElementById("ventana");
    const cerrar = document.getElementById("cerrar");
    const avisoElem = document.getElementById("mensaje");
    const firebaseConfig = {
        apiKey: "AIzaSyAiq27-ue3MeC2H4i1nNKyfJNvWCfmScaw",
        authDomain: "didia5.firebaseapp.com",
        databaseURL: "https://didia5-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "didia5",
        storageBucket: "didia5.appspot.com",
        messagingSenderId: "652405109295",
        appId: "1:652405109295:web:ec25a722d7eb86cba28cda",
        measurementId: "G-02DKN2R0BW"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function crearCuenta(e) {
        e.preventDefault();
        const nombre = nombreInput.value;
        const mail = mailInput.value;
        const contrasena = contrasenaInput.value;
        try {
        await setDoc(doc(db, "usuarios", mail), {
            nombre: nombre,
            contra: contrasena,
            email: mail,
            nota: ""
        });
        aviso(`Cuenta creada exitosamente para: ${nombre}, ahora inicia sesión abajo`);
        } catch (e) {
            aviso(`Error al crear la cuenta: ${e}`);
            aviso("Hubo un error al crear la cuenta, espera un momento");
        }
    }

    async function obtenerUsuario(a) {
        a.preventDefault();
        const mail = mailEInput.value;
        const contra = contraEInput.value;
        const docRef = doc(db, "usuarios", mail);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            data = docSnap.data();
            if (data.contra === contra) {
                aviso("Bienvenido " + data.nombre);
                registro.classList.add("animate__animated", "animate__bounceOutUp");
                iniciars.classList.add("animate__animated", "animate__bounceOutUp");
                ventana.classList.add("animate__animated", "animate__bounceInUp");
                setTimeout(() => {
                    registro.style.display = "none";
                    iniciars.style.display = "none";
                    ventana.style.display = "flex";
                }, 1000);
                Ctexto();
            } else {
                aviso("Contraseña incorrecta");
            }
        } else {
            aviso("Usuario no encontrado");
        }
    }
    let unsubscribeFromNote;

    function Ctexto() {
        if (!data || !data.email) {
            return;
        }
        const mail = data.email;
        const docRef = doc(db, "usuarios", mail);
        if (unsubscribeFromNote) {
            unsubscribeFromNote();
        }
        unsubscribeFromNote = onSnapshot(docRef, (docSnapshot) => {
            if (docSnapshot.exists()) {
                const userData = docSnapshot.data();
                const nuevaNota = userData.nota || "";
                if (texto.value !== nuevaNota) {
                    texto.value = nuevaNota;
                }
            }
        }, (error) => {
            console.error("Error al escuchar la nota:", error);
        });
    }
    async function Itexto() {
        if (!data || !data.email) {
            aviso("Inicia sesión para continuar");
            return;
        }
        const mail = data.email;
        const docRef = doc(db, "usuarios", mail)
        const nota = texto.value;
        await setDoc(docRef, {
            nota: nota
        }, 
        { merge: true });
    }
    function aviso(texto) {
        avisoElem.classList.add("animate__animated", "animate__flipInY");
        avisoElem.style.display = "block";
        avisoElem.innerText = texto;
        setTimeout(() => {
            avisoElem.classList.remove("animate__animated", "animate__flipInY");
            avisoElem.style.display = "none";
        }, 3000);
    }
    texto.addEventListener("input", Itexto)
    registro.addEventListener("submit", crearCuenta);
    iniciars.addEventListener("submit", obtenerUsuario);
    cerrar.addEventListener("click", function() {
        ventana.style.display = "none";
        registro.style.display = "block";
        iniciars.style.display = "block";
        registro.classList.remove("animate__bounceOutUp");
        iniciars.classList.remove("animate__bounceOutUp");
    });
    </script>
