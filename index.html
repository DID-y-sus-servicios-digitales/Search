        /* Corregido: Separamos html de body para que funcione el sticky */

        .ventanas {

            z-index: 4000;
            margin: 0 auto;
            padding: 10px 15px;
            width: 100% !important;

            justify-content: center;
            gap: 15px;
            box-sizing: border-box;

            background: transparent !important;
            border: none !important;
            border-radius: 20px;
        }

        .search-wrapper { flex-grow: 1; max-width: 600px; animation: inicioBuscador 1s ease;}
        @keyframes inicioBuscador {
            from {
                transform: translateY(-400px);
            }
            to {
                transform: translateY(0);
            }
        }
        .gsc-input-box { border-radius: 20px !important; opacity: 0.8 !important; }
        
        .boton-ia-nav {
            padding: 8px 18px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            background: rgba(255, 255, 255, 0.8);

            color: black;
            font-weight: bold;
            white-space: nowrap;
        }

        .max {
            position: fixed;
            top: 100px; 
            z-index: 3000;
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            width: 100%;
            background: transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-sizing: border-box;

        /* Añadimos una transición para el menú */
        #servicios { user-select: none; }
        section {
            margin: 0;
            padding: 0;

        .menu {
            display: inline-block;
            padding: 8px 15px;
            color: #000;

        .daba {

        .boton-ia {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 25px;

            color: black;

            color: white;

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="refrán.js"></script>
<script>
    const avatar = document.getElementById('avatar');
    const usuario = localStorage.getItem('nombreDIDaccount');
    if (usuario) {
        avatar.innerHTML = '<div id="perfil">' + usuario.charAt(0).toUpperCase() + '</div>';
        document.write('<script src="cuentaIcon.js"><\/script>');
    } else {
        avatar.innerHTML = '<span class="material-symbols-outlined">account_circle</span>'
    }
    function logOff() {
        localStorage.removeItem('nombreDIDaccount');
        localStorage.removeItem('passDIDaccount');
        window.location.href = 'index.html';
    }
    function menuContract() {
        const serviciosSection = document.getElementById('servicios');
        if (serviciosSection.style.display === 'none') {
            serviciosSection.style.display = 'flex';
            document.getElementById('cuenta').style.display = 'none';
        } else {
            serviciosSection.style.display = 'none';
        }
    }
    function cuentaContract() {
        const serviciosSection = document.getElementById('cuenta');
        if (serviciosSection.style.display === 'none') {
            serviciosSection.style.display = 'flex';
            document.getElementById('servicios').style.display = 'none';
        } else {
            serviciosSection.style.display = 'none';
        }
    }
    const generarBtn = document.getElementById('generarBtn');
    const qrcodeDiv = document.getElementById('qrcode');
    generarBtn.addEventListener('click', () => {
        const texto = document.getElementById('textoInput').value;
        if (texto) {
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, { text: texto, width: 128, height: 128 });
        }
    });
</script>
