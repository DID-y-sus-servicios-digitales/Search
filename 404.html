<html>
<head>
<title>Página no encontrada</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Alata:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Open Sans', sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #f8f8f8;
        animation: abrir 0.5s;
        font-size: 70px;
        background-image: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('https://did-y-sus-servicios-digitales.github.io/Search/fondo.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
    .error {
        font-size: 100px;
        background-image: linear-gradient(45deg, red, #f0f);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-family: 'Alata';
    }
    button {
        border-radius: 20px;
        border: none;
        background-color: red;
        color: white;
        font-size: 50px;
        box-shadow: 4px 4px 10px #202020;
        transition: box-shadow 0.3s ease;
    }
    button:hover {
        box-shadow: 6px 6px 15px #202020;
    }
    @keyframes abrir {
        0% {
            scale: 0.5;
            transform: translateY(50px);
        }
        50% {
            transform: translateY(-50px);
        }
        100% {
            scale: 1;
        }
    }
</style>
</head>
<body>
    <strong class="error">404</strong>
    <p>Error al encontrar la web</p>
    <button onclick="window.history.back()">Volver</button>
    <button onclick="window.location.href='index.html'">Ir a Inicio</button>
</body>
</html>
